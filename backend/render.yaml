services:
  - type: web
    name: crackit-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      python3.12 --version &&
      python3.12 -m pip install --upgrade pip setuptools wheel &&
      python3.12 -m pip install -r requirements.txt &&
      cd ../frontend &&
      npm ci &&
      npm run build &&
      cd ../backend
    startCommand: python3.12 -m uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    pythonVersion: "3.12"
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://crackit-ai-ueu5.onrender.com
      - key: NODE_ENV
        value: production
    staticPublishPath: ../frontend/build
